services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: resolution_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resolution}
      POSTGRES_DB: ${POSTGRES_DB:-resolution_desk}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resolution} -d ${POSTGRES_DB:-resolution_desk}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resolution_mcp
    command: python -m src.mcp_server.server
    environment:
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: ${MCP_SERVER_PORT:-8100}
      REFUND_AUTO_APPROVE_LIMIT: ${REFUND_AUTO_APPROVE_LIMIT:-50.0}
    ports:
      - "${MCP_SERVER_PORT:-8100}:8100"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resolution_api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-resolution}:${POSTGRES_PASSWORD:-resolution}@postgres:5432/${POSTGRES_DB:-resolution_desk}?sslmode=disable
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mcp_server:
        condition: service_started

volumes:
  pgdata:
